<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fill — fig. 04</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400;1,9..144,600;1,9..144,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:        #ece4d3;
    --paper-deep:   #e0d5bc;
    --card:         #fbf6e9;
    --card-edge:    #1a140e;
    --ink:          #1a140e;
    --ink-2:        #4a3f31;
    --ink-soft:     #8c8067;
    --rule:         rgba(26,20,14,.16);

    --toggle-on:    #4a7d4d;     /* deep moss instead of mint */
    --toggle-track: #d8cdb6;
    --toggle-thumb: #fbf6e9;

    --chip-fill:    #efd9da;     /* dusty rose */
    --chip-stroke:  #b67c83;
    --chip-ink:     #4a1722;     /* burgundy */

    --accent:       #b22a4a;     /* deep red, not magenta */
    --accent-soft:  #d36b7d;

    --sw-stroke:    rgba(26,20,14,.22);
    --sw-stroke-strong: rgba(26,20,14,.7);
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
  html,body{ height:100%; }

  body{
    font-family:"Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 600px at 20% -10%, #f6efde 0%, transparent 60%),
      radial-gradient(900px 600px at 110% 110%, #e9dfc7 0%, transparent 55%),
      var(--paper);
    min-height:100%;
    display:flex; align-items:center; justify-content:center;
    padding:64px 24px;
    letter-spacing:-0.005em;
    position:relative;
  }

  /* paper grain */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:1;
    opacity:.42; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0 0.05  0 0 0 .35 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  .stage{
    position:relative; z-index:2;
    width:100%; max-width:420px;
    display:flex; flex-direction:column; gap:14px;
  }

  /* spec line above the card */
  .spec{
    display:flex; align-items:center; justify-content:space-between;
    padding:0 6px;
    font-family:"JetBrains Mono", ui-monospace, monospace;
    font-size:10px; font-weight:500;
    letter-spacing:.18em; text-transform:uppercase;
    color:var(--ink-2);
  }
  .spec .l{ display:flex; align-items:center; gap:10px; }
  .spec .dot{ width:5px;height:5px;border-radius:50%;background:var(--accent);}
  .spec .r{ font-feature-settings:"tnum"; }

  /* margin annotation */
  .margin-note{
    position:absolute;
    left:calc(100% + 18px);
    top:34px;
    width:170px;
    font-family:"Fraunces", serif; font-style:italic; font-weight:400;
    font-size:14.5px; line-height:1.35; color:var(--ink-2);
  }
  .margin-note::before{
    content:""; position:absolute; left:-18px; top:8px;
    width:14px; height:1px; background:var(--ink-soft);
  }
  @media (max-width: 820px){
    .margin-note{ display:none; }
  }

  /* CARD */
  .card{
    position:relative;
    background:var(--card);
    border:1.25px solid var(--card-edge);
    border-radius:24px;
    padding:18px 20px 4px;
    box-shadow:
      0 1px 0 rgba(0,0,0,.06),
      0 22px 50px -28px rgba(26,20,14,.35);
  }
  /* fine inner rule, like a printed form */
  .card::before{
    content:""; position:absolute; inset:6px;
    border:1px solid rgba(26,20,14,.10);
    border-radius:18px; pointer-events:none;
  }
  /* tiny printer corner ticks */
  .card::after{
    content:""; position:absolute; pointer-events:none;
    inset:-10px;
    background:
      linear-gradient(var(--ink),var(--ink)) left top / 8px 1px no-repeat,
      linear-gradient(var(--ink),var(--ink)) left top / 1px 8px no-repeat,
      linear-gradient(var(--ink),var(--ink)) right top / 8px 1px no-repeat,
      linear-gradient(var(--ink),var(--ink)) right top / 1px 8px no-repeat,
      linear-gradient(var(--ink),var(--ink)) left bottom / 8px 1px no-repeat,
      linear-gradient(var(--ink),var(--ink)) left bottom / 1px 8px no-repeat,
      linear-gradient(var(--ink),var(--ink)) right bottom / 8px 1px no-repeat,
      linear-gradient(var(--ink),var(--ink)) right bottom / 1px 8px no-repeat;
    opacity:.5;
  }

  /* HEAD */
  .head{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 4px 14px;
  }
  .head h2{
    font-family:"Fraunces", serif; font-style:italic; font-weight:800;
    font-size:34px; line-height:1; letter-spacing:-0.02em;
    color:var(--ink);
    display:flex; align-items:baseline; gap:10px;
  }
  .head h2 .num{
    font-family:"JetBrains Mono", monospace; font-style:normal; font-weight:400;
    font-size:11px; letter-spacing:.12em;
    color:var(--ink-soft); transform:translateY(-2px);
  }

  /* iOS-style toggle, but warmer & inkier */
  .toggle{
    --w: 50px; --h: 30px;
    appearance:none; -webkit-appearance:none;
    width:var(--w); height:var(--h);
    background:var(--toggle-track);
    border-radius:999px; position:relative; cursor:pointer; outline:none;
    transition: background .22s ease;
    box-shadow: inset 0 0 0 1px rgba(26,20,14,.18);
  }
  .toggle::after{
    content:""; position:absolute;
    top:1.5px; left:1.5px;
    width:calc(var(--h) - 3px); height:calc(var(--h) - 3px);
    background:var(--toggle-thumb);
    border-radius:50%;
    box-shadow:
      0 1px 1px rgba(0,0,0,.04),
      0 2px 6px rgba(26,20,14,.22),
      0 0 0 1px rgba(26,20,14,.16);
    transition: left .22s cubic-bezier(.32,.72,0,1);
  }
  .toggle:checked{ background:var(--toggle-on); box-shadow: inset 0 0 0 1px rgba(26,20,14,.25); }
  .toggle:checked::after{ left: calc(var(--w) - var(--h) + 1.5px); }

  /* CHIPS row */
  .row-chips{
    display:flex; align-items:center; gap:8px;
    padding:0 4px 12px;
  }
  .preview{
    flex:0 0 auto;
    width:36px; height:36px; border-radius:50%;
    overflow:hidden;
    box-shadow:
      0 0 0 1.25px var(--card),
      0 0 0 2.25px var(--ink),
      0 4px 8px -3px rgba(26,20,14,.35);
    background:#e8d3b2;
  }
  .preview svg{ width:100%; height:100%; display:block; }

  .chip{
    display:inline-flex; align-items:center; gap:7px;
    height:32px; padding:0 13px 0 10px;
    border-radius:999px;
    background:var(--chip-fill);
    border:1px solid var(--chip-stroke);
    color:var(--chip-ink);
    font-family:"Fraunces", serif; font-style:italic; font-weight:600;
    font-size:14.5px; letter-spacing:-0.005em;
    cursor:pointer;
    transition: transform .12s ease, background .15s ease;
    white-space:nowrap;
  }
  .chip:hover{ background:#e9cccd; }
  .chip:active{ transform:translateY(1px); }
  .chip svg{ width:15px; height:15px; flex:0 0 auto; }
  .chip .num{
    font-family:"Hanken Grotesk", sans-serif; font-style:normal; font-weight:600;
    font-size:13px; letter-spacing:0;
  }

  /* SWATCHES */
  .row-sw{
    display:flex; align-items:center; gap:10px;
    padding:4px 4px 8px;
    overflow:hidden;
  }
  .sw{
    --sz: 30px;
    width:var(--sz); height:var(--sz); flex:0 0 auto;
    border-radius:50%;
    cursor:pointer;
    box-shadow: inset 0 0 0 1px var(--sw-stroke);
    position:relative;
    transition: transform .12s ease;
  }
  .sw:hover{ transform:translateY(-1px); }
  .sw.empty{ background:var(--card); box-shadow: inset 0 0 0 1.25px var(--sw-stroke-strong); }
  .sw.bone{ background:#f4ecdb; }
  .sw.matcha{ background:#9ab854; }
  .sw.cobalt{ background:#3b6bcc; }
  .sw.midnight{ background:#15203f; }
  .sw.shell{ background:#e9a4b3; }
  .sw.cherry{ background:#b22a4a; }
  .sw.coal{ background:#0f0a07; }

  .sw.selected::after{
    content:""; position:absolute; inset:-4px;
    border-radius:50%;
    box-shadow: 0 0 0 1.5px var(--card), 0 0 0 2.5px var(--ink);
  }

  /* divider with little fleuron */
  .div-rule{
    display:flex; align-items:center; gap:10px;
    margin:6px 4px 0;
  }
  .div-rule .ln{ flex:1; height:1px; background:var(--rule); }
  .div-rule .glyph{ color:var(--ink-soft); font-family:"Fraunces", serif; font-style:italic; font-size:12px; }

  /* BOTTOM NAV */
  .nav{
    display:grid; grid-template-columns:repeat(4,1fr);
    padding:8px 0 10px;
    margin-top:4px;
  }
  .nav .item{
    position:relative;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:10px 6px 12px;
    color:var(--ink-2);
    cursor:pointer;
    transition: color .15s ease;
  }
  .nav .item:hover{ color:var(--ink); }
  .nav .item .ico{ width:24px; height:24px; display:grid; place-items:center; }
  .nav .item .ico svg{ width:24px; height:24px; }
  .nav .item .lbl{
    font-family:"Fraunces", serif; font-style:italic; font-weight:500;
    font-size:14.5px; letter-spacing:-0.005em;
  }
  .nav .item.active{ color:var(--ink); }
  .nav .item.active .lbl{ font-weight:700; }
  .nav .item.active::after{
    content:""; position:absolute; bottom:2px; left:50%;
    transform:translateX(-50%);
    width:5px; height:5px; border-radius:50%;
    background:var(--accent);
  }

  :focus-visible{ outline:1.5px solid var(--accent); outline-offset:3px; border-radius:6px; }
  .toggle:focus-visible{ border-radius:999px; }
  .sw:focus-visible{ border-radius:50%; }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>

  <div class="stage">

    <div class="spec">
      <span class="l"><span class="dot"></span> fig. 04 — fill</span>
      <span class="r">001 / inspector</span>
    </div>

    <div class="card">

      <p class="margin-note">A small panel for choosing the fill of a thing — colour, opacity, the texture of its surface.</p>

      <!-- header -->
      <div class="head">
        <h2>Fill <span class="num">§ 04.1</span></h2>
        <input class="toggle" type="checkbox" role="switch" checked aria-label="Toggle fill" />
      </div>

      <!-- chips row -->
      <div class="row-chips">
        <span class="preview" aria-hidden="true">
          <!-- tiny etched portrait -->
          <svg viewBox="0 0 36 36">
            <defs>
              <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stop-color="#f6e3b9"/>
                <stop offset="1" stop-color="#d99e7a"/>
              </linearGradient>
            </defs>
            <rect width="36" height="36" fill="url(#sky)"/>
            <circle cx="26" cy="9" r="2.5" fill="#fbf6e9" opacity=".85"/>
            <path d="M0 28 C 8 24, 16 30, 24 26 S 36 26, 36 28 V 36 H 0 Z" fill="#3a2a1d"/>
            <circle cx="18" cy="20" r="6" fill="#2b1c12"/>
            <circle cx="18" cy="17" r="3.4" fill="#e9c79a"/>
          </svg>
        </span>

        <button class="chip" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" aria-hidden="true">
            <rect x="4" y="4" width="16" height="16" rx="3.5"/>
            <path d="M9 17V8.5L15 17V8" stroke-linecap="round"/>
          </svg>
          [Free]
        </button>

        <button class="chip" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 21c5-1.4 8-4.7 8-9s-3.5-9-8-9c-3.4 0-6 2.7-6 6 0 2.7 2 5 5 5 2.2 0 4-1.8 4-4 0-1.7-1.3-3-3-3"/>
          </svg>
          <span class="num">[90%]</span>
        </button>

        <button class="chip" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <defs>
              <pattern id="dots" x="0" y="0" width="3.4" height="3.4" patternUnits="userSpaceOnUse">
                <circle cx="1.7" cy="1.7" r=".95" fill="currentColor"/>
              </pattern>
            </defs>
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="7.3" fill="url(#dots)"/>
          </svg>
          <span class="num">[10]</span>
        </button>
      </div>

      <!-- swatches -->
      <div class="row-sw" role="radiogroup" aria-label="Color">
        <button class="sw empty" aria-label="None"></button>
        <button class="sw bone selected" aria-label="Bone"></button>
        <button class="sw matcha" aria-label="Matcha"></button>
        <button class="sw cobalt" aria-label="Cobalt"></button>
        <button class="sw midnight" aria-label="Midnight"></button>
        <button class="sw shell" aria-label="Shell"></button>
        <button class="sw cherry" aria-label="Cherry"></button>
        <button class="sw coal" aria-label="Coal"></button>
      </div>

      <!-- divider with fleuron -->
      <div class="div-rule" aria-hidden="true">
        <span class="ln"></span>
        <span class="glyph">❦</span>
        <span class="ln"></span>
      </div>

      <!-- bottom nav -->
      <nav class="nav" aria-label="Inspector tabs">
        <div class="item" role="tab">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 28 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 19 L9 4 L15 19 M5 14 H13"/>
              <path d="M25 9.5a4 4 0 0 0-7.5 0V15a3 3 0 0 0 5.5 0v-3.5a3 3 0 0 0-5.5 0"/>
            </svg>
          </span>
          <span class="lbl">Aa</span>
        </div>

        <div class="item" role="tab">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round">
              <path d="M12 2.5 L21.5 12 L12 21.5 L2.5 12 Z"/>
              <path d="M12 8 L16 12 L12 16 L8 12 Z"/>
            </svg>
          </span>
          <span class="lbl">◆</span>
        </div>

        <div class="item" role="tab">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 30 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
              <path d="M3 4 L13 18 M13 4 L3 18"/>
              <circle cx="22" cy="11" r="6"/>
            </svg>
          </span>
          <span class="lbl">x o</span>
        </div>

        <div class="item active" role="tab" aria-selected="true">
          <span class="ico" aria-hidden="true">
            <svg viewBox="0 0 32 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 19 V3 H9 a4 4 0 0 1 0 8 H4 H10 a4.5 4.5 0 0 1 0 9 H3"/>
              <path d="M28 11 a6 6 0 1 1-2-4.6 M28 7 V13 H22"/>
            </svg>
          </span>
          <span class="lbl">BG</span>
        </div>
      </nav>

    </div>

  </div>

  <script>
    document.querySelectorAll('.row-sw .sw').forEach(s => {
      s.addEventListener('click', () => {
        document.querySelectorAll('.row-sw .sw').forEach(x => x.classList.remove('selected'));
        s.classList.add('selected');
      });
    });
    document.querySelectorAll('.nav .item').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.nav .item').forEach(x => {
          x.classList.remove('active');
          x.removeAttribute('aria-selected');
        });
        t.classList.add('active');
        t.setAttribute('aria-selected', 'true');
      });
    });
  </script>

</body>
</html>
